name: Render Quarto book

# Renders the dissertation book on every push to main, on every pull request,
# and nightly at 06:00 UTC. On main, also publishes to Quarto Pub.
#
# Required GitHub repo secret (publish job only): QUARTO_PUB_AUTH_TOKEN
#   Get it from your Mac after first-time `quarto publish quarto-pub`:
#     cat ~/.config/quarto/_publish.yml          # → token field
#   Add in: Settings → Secrets and variables → Actions → New secret.
#
# Design notes:
#   - Python deps are kept deliberately MINIMAL. Only `jupyter` is required to
#     execute the `{python}` chunks that currently exist (chapter2.qmd uses only
#     json + pathlib from stdlib). Add heavier packages like cartopy/netCDF4
#     ONLY when a chapter actually imports them — they need system libs
#     (libproj-dev, libgeos-dev) via `apt-get`, which adds ~2 minutes to CI.
#   - HTML-only for now. PDF rendering is disabled — the primary deliverable
#     is the Quarto Pub site. When ready to produce a submission PDF, add back
#     the "Render PDF" step (see git history) and install TinyTeX.
#   - Slideshows are rendered via build.sh step 2 (not Quarto's book mode).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"     # 06:00 UTC nightly
  workflow_dispatch:         # manual trigger from the Actions tab

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: release

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install minimal Python deps
        run: |
          python -m pip install --upgrade pip
          # Quarto's {python} chunks need the full nb-stack to execute, not
          # just ipykernel. nbformat + nbclient are required by Quarto's
          # share/jupyter/jupyter.py wrapper. Without them, render fails with
          # "ModuleNotFoundError: No module named 'nbformat'" at the first
          # {python} chunk (e.g. chapter2.qmd's stats.json setup chunk).
          # pyyaml is used by sync_figures.sh.
          python -m pip install --retries 5 --timeout 60 \
              ipykernel nbformat nbclient jupyter_client pyyaml
          # If a chapter ships its own requirements.txt, honor it.
          for f in chapter-*/code/requirements.txt; do
            [ -f "$f" ] && python -m pip install --retries 5 -r "$f"
          done
          # Sanity check — fail fast if the essentials didn't land.
          python -c "import ipykernel, nbformat, nbclient, jupyter_client, yaml; print('✓ all deps imported successfully')"

      - name: Render HTML book
        run: |
          quarto render --to html

      - name: Render slideshows (reveal.js)
        continue-on-error: true
        run: |
          for q in chapter-*/presentations/chapter*-slides.qmd chapter-*/presentations/chapter*-progress.qmd; do
            [ -f "$q" ] || continue
            quarto render "$q" --to revealjs
          done

      - name: Copy slideshow HTML into _book/ so links resolve on the live site
        continue-on-error: true
        run: |
          # Book mode rendered the presentation .qmds as flat chapter HTML;
          # here we replace those with the proper reveal.js HTML produced by
          # the step above. This mirrors build.sh step 3.
          for chapter_dir in chapter-*/; do
            src="${chapter_dir}presentations"
            dest="_book/${chapter_dir}presentations"
            if [ -d "$src" ]; then
              mkdir -p "$dest"
              for f in "$src"/*.html "$src"/*_files; do
                [ -e "$f" ] || continue
                cp -R "$f" "$dest/"
                echo "  copied: $f → $dest/"
              done
            fi
          done

      - name: Upload _book/ as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dissertation-book
          path: _book/
          retention-days: 30

  publish:
    # Publish only when the change lands on main (not for PRs, not for nightly cron).
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: render
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: release

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install minimal Python deps
        run: |
          python -m pip install --upgrade pip
          # Same full nb-stack the render job needs.
          python -m pip install --retries 5 --timeout 60 \
              ipykernel nbformat nbclient jupyter_client pyyaml
          for f in chapter-*/code/requirements.txt; do
            [ -f "$f" ] && python -m pip install --retries 5 -r "$f"
          done

      - name: Publish to Quarto Pub
        if: env.QUARTO_PUB_AUTH_TOKEN != ''
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: quarto-pub
        env:
          QUARTO_PUB_AUTH_TOKEN: ${{ secrets.QUARTO_PUB_AUTH_TOKEN }}

      - name: Skip publish (no token configured)
        if: env.QUARTO_PUB_AUTH_TOKEN == ''
        run: |
          echo "::warning::QUARTO_PUB_AUTH_TOKEN secret is not set."
          echo "Run 'quarto publish quarto-pub' locally once, then add the token from"
          echo "~/.config/quarto/_publish.yml to Settings → Secrets → Actions."
          echo "Skipping publish for this run."
        env:
          QUARTO_PUB_AUTH_TOKEN: ${{ secrets.QUARTO_PUB_AUTH_TOKEN }}
